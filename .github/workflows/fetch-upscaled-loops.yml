name: Fetch upscaled hero loops
on:
  workflow_dispatch:
  push:
    branches: [claude/agig-website-setup-lkfhhc]
    paths: ['.github/fetch-now']
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/agig-website-setup-lkfhhc
      - name: Download final video assets from Higgsfield CDN
        run: |
          # Hero loop: Topaz 1080p upscale of beat1-weight
          curl -fsSL -o assets/loops/beat1-weight.mp4 "https://d8j0ntlcm91z4.cloudfront.net/user_3GHcWRO3Lg7pVlIwA53mmtSyqD9/hf_20260718_172014_db267772-d4b4-4968-85b7-fe4f452b1323.mp4"
          # Weight loop: Kling 1080p animation of the outpainted deliberation frame
          curl -fsSL -o assets/loops/beat2-turn.mp4 "https://d8j0ntlcm91z4.cloudfront.net/user_3GHcWRO3Lg7pVlIwA53mmtSyqD9/hf_20260719_124310_70424300-b60a-43b1-a653-87a1ded97f32.mp4"
          ls -la assets/loops/
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/loops/
          git commit -m "Replace hero loops: 1080p upscale + outpainted deliberation animation"
          git push origin claude/agig-website-setup-lkfhhc
