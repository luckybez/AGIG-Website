name: Fix homepage section numbering

on:
  push:
    branches:
      - claude/fix-homepage-section-numbering

permissions:
  contents: write

jobs:
  fix-numbering:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: claude/fix-homepage-section-numbering
          fetch-depth: 0

      - name: Correct visible section labels
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ('04 · What the system can do', '03 · What the system can do'),
              ('05 · The private cognitive system', '04 · The private cognitive system'),
              ('06 · What changes', '05 · What changes'),
              ("07 · In a client's words", "06 · In a client's words"),
              ('08 · Built under real stakes', '07 · Built under real stakes'),
              ('09 · Who this is for', '08 · Who this is for'),
              ('10 · How the engagement works', '09 · How the engagement works'),
              ('11 · Privacy, security, and human authority', '10 · Privacy, security, and human authority'),
              ('12 · The founder', '11 · The founder'),
              ('13 · The invitation', '12 · The invitation'),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one occurrence of {old!r}; found {count}')
              text = text.replace(old, new, 1)

          expected = [
              '01 · The weight',
              '02 · The continuity problem',
              '03 · What the system can do',
              '04 · The private cognitive system',
              '05 · What changes',
              "06 · In a client's words",
              '07 · Built under real stakes',
              '08 · Who this is for',
              '09 · How the engagement works',
              '10 · Privacy, security, and human authority',
              '11 · The founder',
              '12 · The invitation',
          ]
          positions = [text.index(label) for label in expected]
          if positions != sorted(positions):
              raise SystemExit('Section labels are not in the expected order')
          if '13 · The invitation' in text:
              raise SystemExit('Old Section 13 label remains')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit corrected numbering and remove one-time workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-homepage-section-numbering.yml
          git add index.html
          git commit -m "Correct homepage section numbering"
          git push origin HEAD:claude/fix-homepage-section-numbering
